<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Security Code</title>
</head>
<body style="font-family: Arial, Helvetica, sans-serif; background:#f3f2f1; padding:20px;">

<div style="max-width:600px; margin:auto; background:#ffffff; border:1px solid #b1b4b6;">

    <div style="background:#1d70b8; color:white; padding:15px 20px;">
        <h2 style="margin:0;">GOV.UK</h2>
    </div>

    <div style="padding:30px;">

        <h1 style="font-size:28px; margin-top:0;">
            Your GOV.UK Security Code
        </h1>

        <p style="font-size:18px;">
            Your security code is:
        </p>

        <div style="
            font-size:36px;
            font-weight:bold;
            letter-spacing:6px;
            padding:15px;
            border-left:5px solid #1d70b8;
            background:#f8f8f8;
            margin:20px 0;">
            {{OTP_CODE}}
        </div>

        <p>
            This code will expire in <strong>10 minutes</strong>.
        </p>

        <p>
            Do not share this code with anyone.
        </p>

        <p>
            If you did not request this code, you can safely ignore this email.
        </p>

        <hr>

        <p style="color:#505a5f;">
            Visa Status Portal
        </p>

    </div>

</div>

</body>
</html>
