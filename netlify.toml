[build]
  publish = "."
  command = "echo 'Static site - no build needed'"

[context.production]
  environment = { API_URL = "https://visaportal-dl1j.onrender.com" }

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000"
